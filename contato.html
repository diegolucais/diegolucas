    <!-- Animation opening <div> -->
    <div class="animation fade-in">
        <!-- Placeholder -->
        <div id="pen"></div>
        <!-- Contato -->
        <div id="contato" class="container">
            <h2 class="talk text-center">VAMOS CONVERSAR?</h2>
            <p class="text-center">Preencha o formulário abaixo e entrarei em contato o mais breve possível.</p>
            <div class="row">
                <div class="col-lg-6">
                    <form>
                        <div class="form-group">
                            <label for="name">Nome</label>
                            <input type="text" class="form-control" id="name" placeholder="Digite seu nome" />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="exemplo@seuemail.com" />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="message">Mensagem</label>
                            <textarea class="form-control" id="message" rows="5" placeholder="Este formulário não envia mensagens no momento."></textarea>
                        </div>
                        <br>
                        <button type="submit" class="btn btn-outline-dark">Enviar</button>
                    </form>
                    <br>
                </div>
                <div class="col-lg-6">
                    <img src="images/notepad.jpg" alt="os-escaravelhos-de-seth" class="notepad mx-auto d-block">
                </div>
            </div>
        </div>
