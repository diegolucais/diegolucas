<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=index.html">
    <title>Thank You · Diego Lucas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thanks-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .thanks-icon {
            font-size: 4rem;
            color: var(--accent-sky);
            margin-bottom: 24px;
        }

        .thanks-container h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .thanks-container p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 32px;
        }
    </style>
</head>

<body>
    <div class="thanks-container">
        <div class="thanks-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Message sent</h1>
        <p>Thank you for reaching out. I'll get back to you as soon as possible.</p>
        <a href="index.html" class="btn btn-sky">Return to Home</a>
        <p style="margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary);">
            (You'll be redirected automatically in 5 seconds)
        </p>
    </div>
</body>

</html>
